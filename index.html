/* ===================================================================
   INTENTIONAL EDUCATION — THE CORNERSTONE ASSESSMENT
   Framework: The Intentional Education 4D Learning Cycle
     DISCOVER → DEVELOP → DEEPEN → DEMONSTRATE  (NJ quarterly calendar)
   Grounded in: Science of Reading (Scarborough's Rope), DIBELS 8
   benchmark logic, Common Core State Standards, and the evaluator's
   own intervention scope & sequence.
   ARCHITECTURE: every item lives in the ASSESSMENTS config object.
   Copy a grade block + edit to add grades; the engine, scoring,
   profile, report, plan & dual-screen all read from it.
   =================================================================== */
:root{
  /* INTENTIONAL EDUCATION brand — black · white · gold, elegant high-contrast serif.
     (--teal / --aqua names are kept internally but now hold ink + gold so the chrome
     rules need no churn; the bright palette is reserved for the scholar's screen.) */
  /* Intentional Education brand kit: black #0d0d0d, gold #a07c50, grey #888884 */
  --teal:#0d0d0d; --teal-2:#2a2620; --aqua:#a07c50; --ink:#161310; --slate:#6b655c;
  --gold-brand:#a07c50; --gold-soft:#c4a373;
  --mist:#f4efe5; --mist2:#ece1cf; --line:#e7dfd0; --paper:#ffffff; --bg:#f7f3ea;
  /* scholar-facing bright palette (the child's screen only) */
  --blue:#70D6FF; --rose:#FF70A6; --tang:#FF9770; --gold:#FFD670; --lime:#E9FF70;
  --rose-d:#d23c7e; --tang-d:#d96a3f; --gold-d:#b88416; --blue-d:#2a93c9; --green:#3f9a72;
  --shadow:0 14px 38px rgba(28,22,14,.13); --shadow-sm:0 5px 16px rgba(28,22,14,.08);
  --r:18px; --r-sm:12px;
  --sans:'Segoe UI','Helvetica Neue',Arial,system-ui,sans-serif;
  /* professional brand fonts — elegant serif + clean caps */
  --display:'Didot','Bodoni 72','Playfair Display','Georgia',serif;
  --sub:'Didot','Bodoni 72','Georgia',serif;
  --caps:'Helvetica Neue','Arial Narrow',Arial,sans-serif;
  --pf:'Playfair Display','Didot','Georgia',serif;
  /* scholar-facing APL fonts + developmentally-correct reading print */
  --kid-display:'APL Real Talk','Georgia',serif;
  --kid-sub:'Hello Millionaire','Georgia',serif;
  --kid-caps:'APL CAPSLOCK','Arial Black',sans-serif;
  --read:'APL Real Talk','Andika','Chalkboard SE','Comic Sans MS','Quicksand','Century Gothic';/* single-story a/g only — never Arial */
}
.eyebrow,label,th,.panetag,.tierbadge,.brandtxt span,.standard,.phase .goal,.dphase .q,.ptab .q,.badge,.pill,.tagchip{text-transform:uppercase}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);font-weight:400;line-height:1.12;margin:0;letter-spacing:.2px}
button{font-family:inherit;cursor:pointer}
a{color:var(--teal)}
.hidden{display:none!important}
/* shell */
.topbar{background:linear-gradient(115deg,#15110c 0%,#262017 70%,#342d20 100%);color:#fff;padding:12px 28px;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow);position:sticky;top:0;z-index:40;border-bottom:2px solid var(--gold-brand)}
.topbrand{position:absolute;left:50%;transform:translateX(-50%)}
.topbrand svg{width:42px;height:42px}
.topbrand .iewm{font-size:19px}
@media(max-width:680px){.topbrand{position:static;transform:none}}
.brandmark{width:46px;height:46px;flex:none;color:#fff;display:grid;place-items:center}
.brandmark svg{width:46px;height:46px}
.brandtxt b{font-family:var(--display);font-size:22px;letter-spacing:.4px;display:block;font-weight:400}
.brandtxt span{font-family:var(--caps);font-size:10.5px;opacity:.82;letter-spacing:2.5px;color:var(--gold-soft)}
.topnav{margin-left:auto;display:flex;gap:6px}
.topnav button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:8px 17px;border-radius:999px;font-size:13.5px;font-weight:600;transition:.18s}
.topnav button:hover{background:rgba(255,255,255,.27)}
.topnav button.active{background:#fff;color:var(--teal)}
.wrap{max-width:1100px;margin:0 auto;padding:30px 24px 90px}
.screen{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:28px;margin-bottom:22px}
.card h2{font-size:27px;color:var(--teal);margin-bottom:4px}
.eyebrow{font-family:var(--caps);font-size:12px;letter-spacing:2.5px;color:var(--aqua);margin-bottom:9px}
.lead{color:var(--slate);font-size:15px;max-width:66ch}
.row{display:flex;flex-wrap:wrap;gap:16px}
.col{flex:1;min-width:200px}
label{display:block;font-family:var(--caps);font-size:11.5px;color:var(--slate);letter-spacing:1px;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-size:15px;font-family:inherit;background:#fbfdfd;color:var(--ink)}
textarea{resize:vertical;min-height:64px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--aqua);background:#fff}
.check{display:flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer;padding:10px 13px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:#fbfdfd}
.check input{width:auto}
.btn{background:linear-gradient(110deg,var(--teal),var(--aqua));color:#fff;border:none;padding:13px 26px;border-radius:999px;font-size:15px;font-weight:700;box-shadow:var(--shadow-sm);transition:.18s}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn.ghost{background:#fff;color:var(--teal);border:1.5px solid var(--aqua)}
.btn.rose{background:linear-gradient(110deg,var(--rose-d),var(--rose))}
.btn.sm{padding:9px 18px;font-size:13.5px}
.btn.tiny{padding:6px 13px;font-size:12.5px;border-radius:999px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.pill{display:inline-block;padding:4px 13px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.3px;font-family:var(--caps)}
.pill.lit{background:#e6f5fb;color:var(--blue-d)} .pill.math{background:#fff0e6;color:var(--tang-d)}
.tagchip{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11.5px;font-weight:700;font-family:var(--caps);letter-spacing:.6px}
/* hero */
.hero{background:linear-gradient(135deg,#15110c 0%,#262017 58%,#3a3124 100%);color:#fff;border-radius:var(--r);padding:46px 42px;box-shadow:var(--shadow);position:relative;overflow:hidden;margin-bottom:24px;border:1px solid #463a28}
.hero:after{content:"";position:absolute;right:-50px;top:-60px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle,rgba(176,137,74,.22),transparent 70%)}
.hero .eyebrow{color:var(--gold-soft)}
.hero h1{font-size:40px;margin-bottom:10px;position:relative;font-weight:400}
.hero .tagline{font-family:var(--sub);font-style:italic;font-size:19px;color:var(--gold-soft);position:relative;margin-bottom:14px;letter-spacing:.3px}
.hero p{max-width:62ch;font-size:16px;opacity:.92;position:relative}

<script>
/* ===================================================================
   0. FRAMEWORK CONSTANTS — The Intentional Education 4D Learning Cycle
   Quarterly, aligned to the traditional NJ school-year calendar.
   Benchmarks rise toward grade-level mastery by Quarter 4.
   =================================================================== */
const BRAND = { name:"Cornerstone Assessment", business:"Intentional Education", tagline:"Advocacy. Instruction. Intention." };
const PHASES = {
  discover:    { label:"Discovering",   sub:"Understanding the learner",   quarter:"Quarter 1", months:"Jun – Aug", monthsArr:[5,6,7],  bm:"fall",   th:{strong:65,dev:45} },
  develop:     { label:"Developing",    sub:"Building the learner",        quarter:"Quarter 2", months:"Sep – Nov", monthsArr:[8,9,10], bm:"winter", th:{strong:75,dev:55} },
  deepen:      { label:"Deepening",     sub:"Strengthening independence",  quarter:"Quarter 3", months:"Dec – Feb", monthsArr:[11,0,1], bm:"spring", th:{strong:82,dev:62} },
  demonstrate: { label:"Demonstrating", sub:"Showing mastery",             quarter:"Quarter 4", months:"Mar – May", monthsArr:[2,3,4],  bm:"spring", th:{strong:88,dev:68} }
};
const PHASE_ORDER = ["discover","develop","deepen","demonstrate"];
function monthToPhase(m){ for(const k of PHASE_ORDER) if(PHASES[k].monthsArr.includes(m)) return k; return 'discover'; }
/* Legacy data safety: early versions stored the quarter as a season name. Translate + guard. */
const LEGACY_PHASE={fall:"discover",winter:"develop",spring:"deepen",summer:"demonstrate"};
function normPhase(p){ return PHASES[p]?p:(LEGACY_PHASE[p]||"discover"); }
function PH(p){ return PHASES[normPhase(p)]; }
const DISCONTINUE_STREAK = 3; // miss the first 3 → auto-end & step down a level
/* Prompts: max 2 per question; a 3rd forces the item incorrect. Each prompt requires
   a logged student action. "Allow manipulatives" is an ACCOMMODATION, not a prompt. */
const PROMPTS = ["Repeat the question","Keep going, you're so close","Try again"];
const PROMPT_ACTIONS = ["Answered correctly","Self-corrected","Still incorrect","No response"];
const MAX_PROMPTS = 2;
const ACCOMMODATIONS = ["Extended time","Repeated directions","Modified assessment","Multiple prompts","Allow manipulatives"];
const GRADES = [
  {k:"PK4",label:"Pre-K 4"},{k:"K",label:"Kindergarten"},{k:"1",label:"1st Grade"},
  {k:"2",label:"2nd Grade"},{k:"3",label:"3rd Grade"},{k:"4",label:"4th Grade"},{k:"5",label:"5th Grade"}
];
const GRADE_KEYS = GRADES.map(g=>g.k);
/* Age → grade placement (PreK4=4yo, K=5, 1st=6 … 5th=10) */
function ageFrom(bday){ if(!bday) return null; const b=new Date(bday); if(isNaN(b)) return null; const n=new Date(); let a=n.getFullYear()-b.getFullYear(); const md=n.getMonth()-b.getMonth(); if(md<0||(md===0&&n.getDate()<b.getDate())) a--; return a; }
function ageToGrade(bday){ const a=ageFrom(bday); if(a==null) return null; if(a<=4) return 'PK4'; if(a>=10) return '5'; return {5:'K',6:'1',7:'2',8:'3',9:'4'}[a]||'K'; }
function gradeDown(g){ const i=GRADE_KEYS.indexOf(g); return i>0?GRADE_KEYS[i-1]:null; }
/* The growth scale is the 4D cycle itself: for each skill, where is the scholar right now?
   Keys are unchanged so every threshold/scoring calculation still works. */
const BANDS = {
  emerging:  { label:"Discovering",   short:"Just beginning",           color:"#c1543b", fam:"is just beginning to discover these skills — which is exactly where our plan begins" },
  developing:{ label:"Developing",    short:"Building & growing",       color:"#b07d1f", fam:"is developing these skills and becoming more consistent — close to the quarter's goal" },
  ontrack:   { label:"Deepening",     short:"Growing independence",     color:"#2a7ea6", fam:"is deepening these skills, meeting the expectation for this point in the year and working independently" },
  soaring:   { label:"Demonstrating", short:"Shows mastery",            color:"#2c8a5d", fam:"is demonstrating mastery beyond this quarter's expectation and is ready for more challenge" }
};
const BAND_ORDER = ["emerging","developing","ontrack","soaring"];

/* ===================================================================
   LITERACY ROUTINES — Intentional Education's own instructional scripts.
   Transcribed from the Phonics Script, Teaching a New Concept Script,
   weekly Scope & Sequence, and the Kindergarten sight-word lists.
   Scholar-facing language: spoken cues read "Instructor will say:"; actions read "The instructor …".
   =================================================================== */
const LIT_ROUTINES = {
  phonics: [
    { mins:3, part:"Oral Drill — letter sounds", pulls:"letter_sounds", script:[
      "Show graphemes in random order; scholar gives the sound.",
      "If sounds are not yet mastered, scholar gives the NAME and the sound.",
      "Instructor will say: &ldquo;The sound is ____.&rdquo;",
      "Use cold call and choral response to move toward mastery."]},
    { mins:4, part:"Blending Board", pulls:"blending", script:[
      "Use only sounds at 80%+ mastery.",
      "The scholar segments the sounds, then says them fast.",
      "Instructor will say: &ldquo;Is this a real word or a fake word?&rdquo;",
      "If it is a real word, the scholar uses it in a sentence."]},
    { mins:5, part:"Teaching a New Skill", pulls:"skill", script:[
      "Instructor will say: &ldquo;I am going to teach you a new sound. The sound is /__/.&rdquo;",
      "The instructor charts the spelling of the sound on chart paper.",
      "Instructor will say: &ldquo;Can you think of any words where you hear /__/?&rdquo;",
      "Call on 5&ndash;6 scholars; chart their responses."]},
    { mins:8, part:"Dictation / Encoding", pulls:"dictation", script:[
      "The instructor orally dictates 5 words containing the NEW skill plus familiar words.",
      "<b>Every scholar MUST repeat the sound or word before writing.</b>",
      "The scholar writes the word on their paper.",
      "For sounds with two spellings (/c/ and /k/), the instructor explains the choice explicitly.",
      "Use the Dictated Words sheet: First attempt, then Re-Write."]},
    { mins:5, part:"Sight Words", pulls:"sight", script:[
      "The instructor states the word, then reads a sentence containing it.",
      "Instructor will say: &ldquo;How many sounds do you hear?&rdquo;",
      "The instructor reveals the spelling and confirms it, then scoops the spelling.",
      "The scholar spells and TAPS shoulder &rarr; wrist."]},
    { mins:5, part:"Literacy — Decodable Reader", pulls:"questions", script:[
      "The instructor picks a decodable reader that addresses the new skill.",
      "The scholar practices reading with prosody and intonation; the instructor facilitates popcorn reading.",
      "Follow with the reader questions — answer in COMPLETE sentences using CUPS."]}
  ],
  newConcept: [
    ["Alliteration","&ldquo;Did Dan dump dollars down the drain?&rdquo; Instructor will say: &ldquo;Listen &mdash; what sound do you hear?&rdquo;"],
    ["Show the card","Show the NEW card and where the letter falls on the alphabet. &ldquo;The letter is ___. ___ says /__/.&rdquo;"],
    ["Anchor object","Hold an object beginning with that sound. &ldquo;What is it? Yes &mdash; a ____. ____ begins with ___.&rdquo;"],
    ["Brainstorm","The instructor does the writing. &ldquo;Our sound this week is /d/. What words begin with /d/?&rdquo; Gather 6&ndash;8 words."],
    ["Sort the misses","Put inaccurate words in the &ldquo;thinking bubble.&rdquo; &ldquo;Our focus is /d/ &mdash; do you hear /d/ in cat?&rdquo;"],
    ["Letter formation","Explicit handwriting. Lowercase is in the house; uppercase is outside the house. Screen and GREEN crayon."]
  ],
  weekly: [
    ["Alphabet Tracing or Name Writing","Start of class, every day"],
    ["Phonological / Phonemic Awareness","Daily"],
    ["Three Part Drill (what letter, what sound, what word)","Daily"],
    ["Vowel Intensive","If needed"],
    ["Teaching a New Skill (phonics)","Daily"],
    ["Decodable Reader","Daily"],
    ["Sight Words &mdash; 1&ndash;5 new sight words","Teach Tuesday, review Wednesday"]
  ],
  /* IE's Kindergarten sight words: 100 words, in teaching order, 10 per list. */
  kSight: {
    1:["I","can","we","the","at","am","it","up","no","yes"],
    2:["like","a","see","go","in","of","us","by","eat","was"],
    3:["to","have","is","play","come","on","be","big","one","has"],
    4:["are","for","you","this","here","she","run","off","so","want"],
    5:["do","and","what","little","his","two","love","but","all","saw"],
    6:["said","there","him","that","got","not","too","why","first","new"],
    7:["he","as","look","with","they","three","six","where","day","could"],
    8:["my","me","when","jump","went","four","ten","get","away","came"],
    9:["five","seven","eight","your","because","out","from","who","her","then"],
    10:["yellow","red","blue","white","black","brown","green","purple","pink","nine"]
  },
  /* The blending board is always real + fake WORDS, never single letters —
     even when the target skill is letter naming. */
  blendingBank: {
    real: ["cat","sit","pen","mud","top","fan","big","hot","cup","leg","map","hen","fox","run","bed"],
    ccvc: ["clap","frog","stop","trip","flag","grin","snap","plum","crust","blast"],
    fake: ["vap","mip","sug","fet","dib","nuk","tos","wem","jad","rin","kel","zof"]
  },
  questions: ["Who ____?","What ____?","Who had the ____?","What color/kind is the ____?",
              "What did the ____ do?","Why do you think ____?","How did ____ help?"],
  cups: [["C","Capitalization"],["U","Understanding"],["P","Punctuation"],["S","Spelling"]],
  resources: [
    ["Alphabet Tracing Document","Opens class — alphabet tracing or name writing"],
    ["K Tracing Cards","Letter formation practice"],
    ["Sight Word Tracing Cards","Sight word practice"],
    ["Dictated Words sheet","Dictation/encoding — First attempt, then Re-Write"],
    ["Decodable Reader Questions","Comprehension after the decodable reader"],
    ["Sight Words List","Source list for the week's sight words"],
    ["Phonics Hand-Out","Do-Now · Where we are at · Why and How"]
  ]
};
const LIT_SIGHT_TOTAL = 100;

/* ===================================================================
   LETTERFORM RULE — Intentional Education content standard (K–2). HARD RULE.

   1. Any letter shown to a scholar IN ISOLATION is presented in LOWERCASE.
   2. Letterforms must be SINGLE-STORY: the 'a' is a circle with a stem (not the
      two-story typographic 'a'), and the 'g' has a single open tail (not the
      two-story binocular 'g'). These match how a child forms the letter by hand,
      so the print supports natural mastery instead of fighting it.
   3. Scholar-facing letters therefore render ONLY in fonts with single-story a/g.
      Never fall back to Arial/Helvetica, whose 'a' is two-story.

   EXCEPTION — assessment only. CCSS RF.K.1d requires naming BOTH cases, so the
   measures that explicitly assess uppercase naming still show uppercase. They are
   listed below and nowhere else. Instructional content — worksheets, blending,
   dictation, sight words, tracing — is always lowercase.
   =================================================================== */
const LETTERFORM = {
  singleStoryFonts:["APL Real Talk","Andika","Chalkboard SE","Comic Sans MS","Century Gothic","Quicksand"],
  uppercaseAssessmentIds:["pk_alpha","lit_letnames","sk_upper"],   // assessment exception ONLY
  appliesTo:["PK4","K","1","2"]
};
/* Present a letter to a scholar: lowercase, unless this is an uppercase assessment. */
function letterForScholar(ch,opts){
  const o=opts||{}, s=String(ch);
  if(!/^[A-Za-z]$/.test(s)) return s;                                     // not an isolated letter
  if(o.measureId && LETTERFORM.uppercaseAssessmentIds.indexOf(o.measureId)>=0) return s;
  if(o.grade && LETTERFORM.appliesTo.indexOf(o.grade)<0) return s;
  return s.toLowerCase();
}
/* Make a whole set of scholar-facing letters compliant (used by worksheets). */
function lettersForScholar(list,opts){ return (list||[]).map(c=>letterForScholar(c,opts)); }

/* ===================================================================
   LETTER NAMING SCALES — three independent, complete scales.
     upper  all 26 uppercase
     lower  all 26 lowercase
     mixed  all 52 (each letter once in each case)
   Scrambled STEP-style so no alphabetical run gives the scholar a free ride.
   NOTE ON BENCHMARKS: published LNF norms are collected on MIXED case. A
   single-case scale is a valid skill measure but is NOT comparable to the
   mixed-case benchmark; the tool says so on screen.
   =================================================================== */
const LETTER_SCALES = {
  upper:{ label:"Uppercase (all 26)", norm:false,
    letters:["S","M","B","T","A","P","F","I","N","R","E","O","H","C","D","L","U","G","K","W","J","V","Y","X","Q","Z"] },
  lower:{ label:"Lowercase (all 26)", norm:false,
    letters:["s","m","a","t","p","f","n","i","d","o","b","r","e","h","c","l","u","g","k","w","j","v","y","x","q","z"] },
  mixed:{ label:"Mixed case (all 52)", norm:true,
    letters:["S","m","B","t","a","P","f","I","n","R","e","O","h","C","d","L","u","G","k","W","j","V","y","X","q","Z",
             "s","M","b","T","A","p","F","i","N","r","E","o","H","c","D","l","U","g","K","w","J","v","Y","x","Q","z"] }
};
const LETTER_SCALE_IDS = ["lit_letnames"];   // measures that offer a scale choice
function letterScale(){ return (S.session && S.session.letterScale) || 'mixed'; }
/* Swap the measure's stimulus to the selected scale. Fluency scores are a COUNT,
   so changing the number of letters is safe. */
function applyLetterScale(st){
  if(!st || LETTER_SCALE_IDS.indexOf(st.id)<0) return st;
  st.stimulus.content = LETTER_SCALES[letterScale()].letters.slice();
  return st;
}
function setLetterScale(kind){
  if(!LETTER_SCALES[kind]) return;
  S.session.letterScale = kind;
  renderAssess();
}
function letterScalePicker(st){
  if(!st || LETTER_SCALE_IDS.indexOf(st.id)<0) return '';
  const cur=letterScale();
  const btns=Object.keys(LETTER_SCALES).map(k=>{
    const s=LETTER_SCALES[k];
    return `<button class="btn ${k===cur?'':'ghost'} sm" onclick="setLetterScale('${k}')">${s.label}</button>`;
  }).join(' ');
  const warn=LETTER_SCALES[cur].norm
    ? `<span class="footnote">Mixed case matches the published benchmark.</span>`
    : `<span class="footnote"><b>Note:</b> single-case scales are valid skill measures, but the letters/min benchmark is normed on mixed case — don't compare this score to it.</span>`;
  return `<div class="card" style="padding:12px 14px;margin:0 0 12px">
    <div class="eyebrow">Letter naming scale</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0">${btns}</div>
    ${warn}
  </div>`;
}

function bandOverall(pct,phase){ const th=PHASES[phase].th; return pct>=95?'soaring':pct>=th.strong?'ontrack':pct>=th.dev?'developing':'emerging'; }

/* ===================================================================
   1. ASSESSMENT CONFIG — Kindergarten fully built (master template).
      Other grades scaffolded; deepened one grade per session.
   =================================================================== */
const K_LITERACY = {
  key:"literacy", grade:"K", label:"Literacy Foundations", strandType:"Reading Rope Strand",
  subtests:[
    { id:"lit_rhyme", strand:"Phonological Awareness", title:"Rhyme Recognition", standard:"CCSS K.RF.2a", type:"items", goal:"hearing and recognizing rhyme",

      interventions:["Play oral rhyming games daily — “I spy something that rhymes with…”","Read rhyming picture books and pause for the child to supply the rhyme","Sort picture cards into rhyme families (cat/hat/bat)"] },
    { id:"lit_syllable", strand:"Phonological Awareness", title:"Syllable Blending & Segmenting", standard:"CCSS K.RF.2b", type:"items", goal:"blending and counting syllables",
      script:"Say the word in parts. <span class='say'>“Put the parts together — what's the word?”</span> Then have the child clap the parts back.",
      items:[{label:"rain · bow",hint:"rainbow"},{label:"pen · cil",hint:"pencil"},{label:"but · ter · fly",hint:"butterfly"},{label:"sun",hint:"1 part"},{label:"el · e · phant",hint:"elephant"},{label:"ta · ble",hint:"table"}],
      interventions:["Clap, tap, or march syllables in the child's name and familiar words","Use chips or blocks — one per syllable — to make parts visible","Robot-talk game: say words in parts and have the child blend them"] },

/* v2 migration: 3rd-grade math "Multiplication & Division Problems" used to share the
   id "g3_word" with 3rd-grade literacy. Re-key it to g3_muldiv so skill rollups stay distinct. */
function migrateSessions(list){
  let touched=false;
  const MAPS=["marks","fluency","timers","iprompts","responses","focus"];
  (list||[]).forEach(r=>{
    if(!r || r.grade!=="3" || r.domainKey!=="math") return;
    MAPS.forEach(k=>{
      const m=r[k];
      if(m && typeof m==="object" && m.g3_word!==undefined && m.g3_muldiv===undefined){
        m.g3_muldiv=m.g3_word; delete m.g3_word; touched=true;
      }
    });
  });
  if(touched){ try{ save(STORE,list); }catch(e){} }
  return list;
}

/* ===================================================================
   STAFF ACCESS — light client-side passcode gate (a soft gate to keep the
   public out of a hosted copy; real per-user logins come with the Phase 2
   backend). Change STAFF_PASSCODE below to your own code.
   =================================================================== */
const STAFF_PASSCODE = "IEstaff2026";
const STAFF_KEY = "foundations_staff_ok_v1";
function staffOk(){ try{ return localStorage.getItem(STAFF_KEY)==="1"; }catch(e){ return false; } }
function staffSignIn(){ const el=document.getElementById('staffPass'); const v=(el&&el.value||'').trim();
  if(v===STAFF_PASSCODE){ try{ localStorage.setItem(STAFF_KEY,"1"); }catch(e){} document.body.classList.remove('gated'); nav('home'); try{ cloudSyncNow().then(function(){ if(typeof S!=='undefined' && S.screen==='home') nav('home'); }); }catch(e){} }
  else { const err=document.getElementById('staffErr'); if(err) err.style.display='block'; if(el){ el.value=''; el.focus(); } } }
function staffSignOut(){ try{ localStorage.removeItem(STAFF_KEY); }catch(e){} nav('home'); }
function toggleStaffPass(){ const i=document.getElementById('staffPass'), b=document.getElementById('staffShow'); if(!i)return; if(i.type==='password'){ i.type='text'; if(b)b.textContent='Hide'; } else { i.type='password'; if(b)b.textContent='Show'; } i.focus(); }

function scholarCard(name, sess){
  sess=sess.slice().sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)); const last=sess[0];

    <div class="schhead">${monogramSVG(34)}<div><div class="schname">${esc(name)}</div><div class="schmeta">${esc(gradeLabel(last.grade))} &middot; ${sess.length} session${sess.length>1?'s':''} &middot; last ${esc(last.date)}</div></div></div>
    <div class="schchips">${sess.slice(0,4).map(s=>`<span class="schchip">${PH(s.phase).label} &middot; ${s.domainKey==='literacy'?'Lit':'Math'} &middot; ${s.overall}%</span>`).join("")}</div>
    <div class="schactions"><button class="btn sm" onclick="openProfile('${encodeURIComponent(name)}')">Open Profile</button><button class="btn ghost sm" onclick="startNextFor('${last.id}')">Start Next</button></div>

}

function skillById(id){ return SKILL_PROBES.find(s=>s.id===id); }
function startProbe(enc, skillId){ const name=decodeURIComponent(enc); const last=loadSessions().filter(s=>s.student===name).sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id))[0]; S.probe={ skillId, scholar:name, grade:(last&&last.grade)||'K', marks:[], notes:'', evaluator:getEvaluators()[0]||'' }; nav('probe'); }
function probeMark(i,val){ if(!S.probe)return; S.probe.marks[i]=val; renderProbe(); }
function renderProbe(){
  const p=S.probe, sk=p&&skillById(p.skillId);
  if(!sk){ nav('scholars'); return; }
  const done=p.marks.filter(x=>x!==undefined&&x!==null).length;
  app.innerHTML=`<div class="screen card">
    <div class="eyebrow">Skill Check &middot; ${esc((SKILL_GROUPS.find(g=>g.key===sk.group)||{}).label||'')}</div>
    <h2>${esc(sk.title)}</h2>
    <p class="footnote" style="margin-top:2px">${esc(sk.standard)} &middot; typical band ${esc(sk.band)} &middot; ${esc(p.scholar)}</p>
    ${sk.read?`<div style="margin:8px 0"><button class="dualbtn" onclick="openScholarScreenProbe()" title="Show the scholar a big, colorful view of the letters/words on a second screen">Open Scholar Screen</button></div>`:''}
    <div class="callout" style="margin:12px 0">${sk.script}</div>
    <div class="probelist">
      ${sk.items.map((it,i)=>`<div class="probeitem ${p.marks[i]==='skip'?'skipped':''}">
        <div class="ptarget ${sk.read?'read':''}">${esc(it.label)}${it.hint?`<span class="phint">${esc(it.hint)}</span>`:''}</div>
        <div class="scoretoggle">
          <button class="yes ${p.marks[i]===true?'on':''}" onclick="probeMark(${i},true)" title="Correct">✓</button>
          <button class="no ${p.marks[i]===false?'on':''}" onclick="probeMark(${i},false)" title="Incorrect">✕</button>
          <button class="skp ${p.marks[i]==='skip'?'on':''}" onclick="probeMark(${i},'skip')" title="No response">No ans</button>
        </div></div>`).join('')}
    </div>
    <label style="margin-top:14px;display:block">Notes (optional)</label>
    <textarea id="probeNotes" placeholder="What you noticed…" oninput="S.probe.notes=this.value">${esc(p.notes||'')}</textarea>
    <div class="subtest-foot">
      <button class="btn ghost" onclick="openProfile('${encodeURIComponent(p.scholar)}')">Cancel</button>
      <button class="btn" onclick="finishProbe()" ${done<sk.items.length?'disabled title="Mark every item first"':''}>Finish Skill Check</button>
    </div>
  </div>`;
}
function openScholarScreenProbe(){
  scholarWin=window.open("","FoundationsScholar","width=900,height=680");
  if(!scholarWin){ alert("Please allow pop-ups so the scholar screen can open in its own window."); return; }
  scholarWin.document.open(); scholarWin.document.write(scholarDoc()); scholarWin.document.close();
  broadcastProbe(); renderProbe();
}
function broadcastProbe(){
  const p=S.probe, sk=p&&skillById(p.skillId); if(!sk) return;
  let stim, sub;
  if(sk.read){ const letters=sk.items.every(it=>String(it.label).length<=2);
    stim=`<div class="tiles">${sk.items.map(it=>`<div class="tile ${letters?'':'word'}">${esc(it.label)}</div>`).join("")}</div>`; sub=""; }
  else { stim='<div class="big">★</div>'; sub="Listen and do your best!"; }
  const payload={heading:"Your turn!", sub:sub, stim:stim, manip:false, pointer:{on:false,idx:0}, t:Date.now()};
  save(LIVE,payload);
  if(scholarWin && !scholarWin.closed){ try{ scholarWin.postMessage(payload,'*'); }catch(e){} }
}
function probeBand(pct){ return pct>=80?{band:'soaring',label:BANDS.soaring.label,tier:'core'}:pct>=60?{band:'ontrack',label:BANDS.ontrack.label,tier:'strategic'}:pct>=40?{band:'developing',label:BANDS.developing.label,tier:'strategic'}:{band:'emerging',label:BANDS.emerging.label,tier:'intensive'}; }
function finishProbe(){
  const p=S.probe, sk=skillById(p.skillId); if(!sk) return;
  const total=sk.items.length, yes=p.marks.filter(x=>x===true).length;
  const pct=Math.round(yes/total*100); const pb=probeBand(pct);
  const checks=((getProfile(p.scholar)||{}).skillChecks||[]).slice();
  checks.push({ skillId:sk.id, title:sk.title, group:sk.group, standard:sk.standard, date:new Date().toISOString().slice(0,10),
    pct, correct:yes, total, band:pb.band, label:pb.label, notes:p.notes||'', evaluator:p.evaluator||'', interventions:sk.interventions });
  saveProfile(p.scholar,{skillChecks:checks});
  S.probe=null; openProfile(encodeURIComponent(p.scholar));
}

function skillChecksHTML(name){
  const enc=encodeURIComponent(name), checks=((getProfile(name)||{}).skillChecks||[]).slice().reverse();
  const opts=SKILL_GROUPS.map(g=>`<optgroup label="${esc(g.label)}">${SKILL_PROBES.filter(s=>s.group===g.key).map(s=>`<option value="${s.id}">${esc(s.title)}</option>`).join('')}</optgroup>`).join('');
  const latestBySkill={}; ((getProfile(name)||{}).skillChecks||[]).forEach(c=>{ latestBySkill[c.skillId]=c; });
  const attempted=Object.values(latestBySkill);
  const byGroup={}; attempted.forEach(c=>{ const sk=skillById(c.skillId); const g=(sk&&sk.group)||'other'; (byGroup[g]=byGroup[g]||[]).push(c); });
  const masteryBoard=SKILL_GROUPS.filter(g=>byGroup[g.key]).map(g=>{
    const list=byGroup[g.key].slice().sort((a,b)=>a.title.localeCompare(b.title));

    return `<div class="masterygrp"><div class="mg-h">${esc(g.label)}<span class="mg-count">${mastered}/${list.length} mastered</span></div><div class="chips">${chips}</div></div>`;
  }).join('');
  return `<div class="card"><div class="eyebrow">Skill Checks</div><h2>Quick targeted checks</h2>
    <p class="lead">Run a fast, single-skill check any time — from the full assessment bank of letter sounds, phonics patterns, phonemic awareness, fluency, spelling, vocabulary, comprehension, speaking &amp; listening, and math subskills. Each result is captured right here in ${esc(name.split(' ')[0])}'s profile.</p>

    ${attempted.length?`<div style="margin-top:16px"><div class="stdom">Skill mastery map</div>
      <div class="footnote" style="margin:2px 0 4px">Grouped by area, colored by latest result: <b style="color:${BANDS.soaring.color}">${BANDS.soaring.label}</b> · <b style="color:${BANDS.ontrack.color}">${BANDS.ontrack.label}</b> · <b style="color:${BANDS.developing.color}">${BANDS.developing.label}</b> · <b style="color:${BANDS.emerging.color}">${BANDS.emerging.label}</b>.</div>
      ${masteryBoard}</div>`:''}
    ${checks.length?`<div style="margin-top:14px"><div class="stdom" style="display:flex;justify-content:space-between;align-items:center">History <button class="btn ghost sm" style="text-transform:none;letter-spacing:0" onclick="exportSkillChecksCSV('${enc}')">Export CSV</button></div>
      <table><thead><tr><th>Date</th><th>Skill</th><th>Result</th><th>Score</th></tr></thead><tbody>
      ${checks.map(c=>`<tr><td>${esc(c.date)}</td><td>${esc(c.title)}</td><td style="color:${BANDS[c.band].color};font-weight:700">${esc(c.label)}</td><td>${c.correct}/${c.total} (${c.pct}%)</td></tr>`).join('')}
      </tbody></table></div>`:'<div class="callout" style="margin-top:12px">No skill checks yet. Pick a skill above and run a quick check.</div>'}
  </div>`;

function growthSection(label, sessions){
  if(!sessions.length) return `<div style="margin-top:8px"><div class="stdom">${label}</div><div class="footnote">No ${label.toLowerCase()} evaluations yet.</div></div>`;
  const W=Math.max(300, sessions.length*80+40), H=176, base=134, top=22, bw=44, gap=36;
  const bars=sessions.map((s,i)=>{ const x=30+i*(bw+gap); const h=Math.max(3,Math.round((s.overall/100)*(base-top))); const y=base-h;
    const col=BANDS[(s.result&&s.result.overallBand)||'developing'].color;
    return `<g><rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="5" fill="${col}"/>
      <text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="12.5" font-weight="800" fill="#0d0d0d">${s.overall}%</text>
      <text x="${x+bw/2}" y="${base+15}" text-anchor="middle" font-size="10.5" fill="#6b6b6b">${(PH(s.phase).quarter||'').replace('Quarter ','Q')}</text>
      <text x="${x+bw/2}" y="${base+29}" text-anchor="middle" font-size="9.5" fill="#a49a86">${esc(s.date.slice(5))}</text></g>`;
  }).join('');
  return `<div style="margin-top:12px"><div class="stdom">${label} — overall on-target %</div>
    <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="max-width:100%;height:auto;min-width:${Math.min(W,340)}px">
    <line x1="24" y1="${base}" x2="${W-8}" y2="${base}" stroke="#e3ddd2" stroke-width="1.5"/>${bars}</svg></div></div>`;
}
function orfChart(litSessions){
  const pts=litSessions.map(s=>{ const f=((s.result&&s.result.subs)||[]).find(x=>x.type==='fluency'&&x.avg); return f?{date:s.date,raw:f.raw,avg:f.avg,q:PH(s.phase).quarter}:null; }).filter(Boolean);
  if(!pts.length) return '';
  const maxV=Math.max.apply(null,pts.map(p=>p.raw).concat(pts.map(p=>p.avg)).concat([10]));
  const W=Math.max(300, pts.length*104+40), H=178, base=134, top=22;
  const g=pts.map((p,i)=>{ const gx=32+i*100; const h1=Math.max(3,Math.round(p.raw/maxV*(base-top))), h2=Math.max(3,Math.round(p.avg/maxV*(base-top)));
    return `<g><rect x="${gx}" y="${base-h1}" width="32" height="${h1}" rx="4" fill="#a07c50"/>
      <rect x="${gx+38}" y="${base-h2}" width="32" height="${h2}" rx="4" fill="#cabfa6"/>
      <text x="${gx+16}" y="${base-h1-5}" text-anchor="middle" font-size="11" font-weight="800" fill="#0d0d0d">${p.raw}</text>
      <text x="${gx+54}" y="${base-h2-5}" text-anchor="middle" font-size="11" fill="#6b6b6b">${p.avg}</text>
      <text x="${gx+35}" y="${base+15}" text-anchor="middle" font-size="10.5" fill="#6b6b6b">${(p.q||'').replace('Quarter ','Q')}</text></g>`;
  }).join('');
  return `<div style="margin-top:14px"><div class="stdom">Oral Reading Fluency (WCPM) vs. national average</div>
    <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="max-width:100%;height:auto;min-width:${Math.min(W,340)}px">
    <line x1="24" y1="${base}" x2="${W-8}" y2="${base}" stroke="#e3ddd2" stroke-width="1.5"/>${g}</svg></div>
    <div style="font-size:11.5px;color:#6b6b6b;margin-top:2px"><span style="color:#a07c50">■</span> ${esc((S.profileName||'Scholar').split(' ')[0])} &nbsp; <span style="color:#cabfa6">■</span> National average</div></div>`;
}

function collectFocusSubs(all){
  const byDom={}; all.forEach(s=>{ byDom[s.domainKey]=s; });

  ['literacy','math'].forEach(d=>{ const s=byDom[d]; if(s&&s.result&&s.result.focus) s.result.focus.forEach(f=> subs.push(Object.assign({domain:d},f))); });

function nextCurriculumTarget(name, cur){
  const covered=new Set(cur.map(w=>w.skillId).filter(Boolean));
  const coveredTitles=new Set(cur.map(w=>(w.skill||'').toLowerCase()));
  const all=loadSessions().filter(s=>s.student===name);
  for(const f of collectFocusSubs(all)){ if(!coveredTitles.has((f.title||'').toLowerCase())) return {skill:f.title,domain:f.domain,standard:f.standard||'',interventions:f.interventions||[],source:'Diagnostic focus area'}; }
  for(const sk of SKILL_PROBES){ if(!covered.has(sk.id)) return {skillId:sk.id,skill:sk.title,domain:sk.domain,standard:sk.standard,interventions:sk.interventions,source:'Scope & sequence'}; }
  return {skill:'Reading & Number Enrichment',domain:(cur.length%2?'literacy':'math'),standard:'',interventions:['Read together for 15 minutes each day and talk about the story','Play a quick number-facts game (cards, dice, or dominoes)','Notice and discuss new vocabulary words you meet'],source:'Enrichment'};

  const prof=getProfile(name)||{}, seen=new Set(), targets=[], orderBand={emerging:0,developing:1};

/* A brand-new project's API can take a minute to notice new tables ("schema cache"
   error). Retry transparently instead of failing. */
const isSchemaCache=e=>/schema cache|Could not find the table|does not exist/i.test((e&&e.message)||String(e));
async function withRetry(fn,label,tries){
  tries=tries||6;
  for(let i=0;i<tries;i++){
    try{ return await fn(); }
    catch(e){
      if(isSchemaCache(e) && i<tries-1){
        const btn=document.getElementById('migBtn');
        if(btn) btn.textContent='Waiting for database… ('+(i+1)+')';
        await new Promise(r=>setTimeout(r,4000)); continue;
      }
      throw e;
    }
  }
}

        if(migrated().builders.includes(bkey)) continue;
        const {error}=await sb.from('lesson_plans').insert({owner_id:user.id,scholar_id:sid,
          weeks:0, generated_on:(L.instrDate||fmtD(new Date())), plan:Object.assign({_kind:'builder'},L)});
        if(error) throw error; markMigrated('builders',bkey); bl++;
      }
    }
    log.push(`skill checks: ${chk}`, `lesson plans: ${pl}`, `lessons: ${bl}`);
    alert('Migration complete —\n'+log.join('\n'));
  }catch(e){ alert('Migration stopped: '+(e.message||e)); }
  renderCloud();
}

/* Pull everything back down — this is what makes another device / domain work. */
async function cloudPull(){
  const sb=await supa(), user=await cloudUser();
  if(!sb||!user){ alert('Sign in first.'); return; }
  try{
    const {data:sch,error:e1}=await sb.from('scholars').select('*'); if(e1) throw e1;
    const {data:evs,error:e2}=await sb.from('evaluations').select('*').order('taken_on'); if(e2) throw e2;
    const {data:chks,error:e3}=await sb.from('skill_checks').select('*'); if(e3) throw e3;
    let plans=[]; try{ const r=await sb.from('lesson_plans').select('*'); if(!r.error) plans=r.data||[]; }catch(e){}
    const byId={}; (sch||[]).forEach(s=>byId[s.id]=s);
    const localProfiles=loadProfiles();
    const profiles={};
    // MERGE, don't overwrite: start from the existing local profile so device-only
    // fields (uploaded documents, IEP text, weekly plans, in-progress work) survive a pull.
    (sch||[]).forEach(s=>{ const key=pkey(s.name); const prev=localProfiles[key]||{};
      profiles[key]=Object.assign({}, prev, {name:s.name,birthday:s.birthday||'',grade:s.grade||'',
        iep:!!s.iep,plan504:!!s.plan504,accommodations:s.accommodations||[],sightList:s.sight_list||1,
        skillChecks:[],updated:fmtD(new Date())}); });
    (chks||[]).forEach(c=>{ const s=byId[c.scholar_id]; if(!s) return;
      profiles[pkey(s.name)].skillChecks.push({skillId:c.skill_id,band:c.band,pct:c.pct,date:c.checked_on}); });
    // Rebuild lessons + smart plan from the cloud (newest wins).
    const bild={};
    (plans||[]).forEach(row=>{ const s=byId[row.scholar_id]; if(!s) return; const key=pkey(s.name); const P=profiles[key]; if(!P) return;
      const plan=row.plan||{};
      if(plan._kind==='builder'){ const k=key+'|'+(plan.instrDate||'')+'|'+(plan.skillKey||plan.skill||'');
        if(!bild[k] || (plan.savedAt||'')>(bild[k].savedAt||'')) bild[k]=plan; }
      else { if(!P.lessonPlan || (row.generated_on||'')>=(P.lessonPlan.generated||'')) P.lessonPlan=plan; }
    });
    const byScholar={};
    Object.keys(bild).forEach(k=>{ const key=k.split('|')[0]; (byScholar[key]=byScholar[key]||[]).push(bild[k]); });
    Object.keys(byScholar).forEach(key=>{ if(!profiles[key]) return;
      const log=byScholar[key].map(function(b){ var c=Object.assign({},b); delete c._kind; return c; })
        .sort(function(a,b){ return (b.savedAt||'').localeCompare(a.savedAt||''); });
      profiles[key].lessonLog=log; profiles[key].lessonLast=log[0]||null; });
    const sessions=(evs||[]).map(e=>({ id:e.id, student:(byId[e.scholar_id]||{}).name||'', grade:e.grade,
      domainKey:e.domain, module:e.module, form:e.form, phase:e.phase, date:e.taken_on,
      evaluator:e.evaluator||'', location:e.location||'', letterScale:e.letter_scale||'mixed',
      durationMin:e.duration_min, iep:!!e.iep, plan504:!!e.plan504, accommodations:e.accommodations||[],
      notes:e.notes||'', recommendations:e.recommendations||'', marks:e.marks||{}, fluency:e.fluency||{},
      timers:e.timers||{}, iprompts:e.prompts||{}, responses:e.responses||{}, result:e.result||{} }));
    save(PROFILE_STORE,profiles); save(STORE,sessions);
    // Record what is already in the cloud so the next push doesn't duplicate it.
    const ckeys=[], pkeys=[], bkeys=[];
    Object.keys(profiles).forEach(key=>{ const P=profiles[key];
      (P.skillChecks||[]).forEach(c=>ckeys.push(`${P.name}|${c.skillId}|${c.date||''}`));
      if(P.lessonPlan) pkeys.push(`${P.name}|${P.lessonPlan.generated||''}`);
      (P.lessonLog||[]).forEach(L=>bkeys.push(`${P.name}|${L.instrDate||''}|${L.skillKey||L.skill||''}|${L.savedAt||''}`));
    });
    save(MIGRATED_KEY,{sessions:sessions.map(s=>s.id),checks:ckeys,plans:pkeys,builders:bkeys});
    alert(`Pulled ${sch.length} scholars and ${evs.length} evaluations from the cloud.`);
    renderCloud();
  }catch(e){ alert('Pull failed: '+(e.message||e)); }
}

/* ===================================================================
   AUTO-SYNC — makes the cloud feel seamless across devices.
   On open (signed in): push anything pending, then pull the latest, so
   your iPad shows what your laptop last saved. During use: every change
   schedules a quiet push. A small pill shows the status.
   =================================================================== */
window._silentSync=false; window._syncing=false; var _pushTimer=null;
async function runSilent(fn){ window._silentSync=true; const A=window.alert; window.alert=function(){};
  try{ return await fn(); } finally{ window.alert=A; window._silentSync=false; } }
function syncPill(state){
  var el=document.getElementById('syncPill');
  if(!el){ el=document.createElement('div'); el.id='syncPill';
    el.style.cssText='position:fixed;right:14px;bottom:14px;z-index:9999;font:600 12px/1 -apple-system,Segoe UI,Arial,sans-serif;padding:8px 12px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.18);cursor:default;transition:opacity .4s;user-select:none';
    document.body.appendChild(el); }
  var map={
    syncing:['Syncing…','#3a3a3a','#fff',''],
    ok:['Synced ✓','#e8f4ec','#1c6b3e',''],
    offline:['Offline — will retry','#fbeeee','#8a2b2b',''],
    signin:['Sign in to sync','#111111','#F5EEDD','nav(\'cloud\')']
  };
  var m=map[state]||map.ok; el.textContent=m[0]; el.style.background=m[1]; el.style.color=m[2];
  el.onclick = m[3]? function(){ nav('cloud'); } : null;
  el.style.cursor = m[3]? 'pointer':'default'; el.style.opacity='1';
  if(state==='ok'){ clearTimeout(el._t); el._t=setTimeout(function(){ el.style.opacity='0'; },2200); }
}
async function cloudSyncNow(){
  if(window._syncing) return;
  var user=null; try{ user=await cloudUser(); }catch(e){}
  if(!user){ syncPill('signin'); return; }
  window._syncing=true; syncPill('syncing');
  try{ await runSilent(function(){ return cloudMigrate({silent:true}); });
       await runSilent(function(){ return cloudPull({silent:true}); });
       syncPill('ok'); }
  catch(e){ syncPill('offline'); }
  finally{ window._syncing=false; }
}
function scheduleCloudPush(){
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(function(){ (async function(){
    if(window._syncing) return; var user=null; try{ user=await cloudUser(); }catch(e){}
    if(!user){ syncPill('signin'); return; }
    window._syncing=true; syncPill('syncing');
    try{ await runSilent(function(){ return cloudMigrate({silent:true}); }); syncPill('ok'); }
    catch(e){ syncPill('offline'); } finally{ window._syncing=false; }
  })(); }, 2500);
}

/* ===================================================================
   LESSON STUDIO — turns a scholar's data into a ready-to-teach
   30-minute phonics lesson using IE's own scripts.
   =================================================================== */
function litSightList(name){ const p=getProfile(name)||{}; return Math.min(10,Math.max(1,parseInt(p.sightList,10)||1)); }
function setSightList(enc,n){ const name=decodeURIComponent(enc); saveProfile(name,{sightList:Math.min(10,Math.max(1,parseInt(n,10)||1))}); renderLitLesson(); }
function buildLitLesson(name){
  const targets=lessonPlanTargets(name).filter(t=>t.domain==='literacy');
  const t=targets[0]||null;
  const words=(t&&t.words&&t.words.length)?t.words.map(w=>String(w).trim()):[];
  /* Probe items can be letters ("M"), single words ("cat"), or pairs ("cat / hat").
     Only single tokens are usable; pairs never are. */
  const isToken=w=>/^[A-Za-z]{1,12}$/.test(w);
  const singles=words.filter(isToken);
  const realWords=singles.filter(w=>w.length>=3);          // a letter is not a blending word
  const B=LIT_ROUTINES.blendingBank;
  /* Blending board: 4 real + 2 fake, so "real word or fake word?" always has an answer.
     If the target itself is word-level, practice the target's words; otherwise use CVC. */
  const real=(realWords.length>=4?realWords:B.real).slice(0,4);
  const blending=real.concat(B.fake.slice(0,2));
  /* Dictation may be words OR sounds — the script allows both, so single letters are fine. */
  const dictation=(singles.length>=5?singles:B.real).slice(0,5);
  const listNo=litSightList(name);
  const pct=(t&&t.source&&/undefined/.test(t.source))?null:(t?t.source:'');
  return {
    target:t,
    skill: t?t.title:null,
    standard: t?t.standard:'',
    source: pct||'',
    blending, blendingFake: B.fake.slice(0,2),
    dictation,
    listNo,
    sight: LIT_ROUTINES.kSight[listNo]||[],
    interventions: (t&&t.interventions)||[]
  };
}
function litFill(pulls,L){
  if(pulls==='blending'){ const fake=new Set(L.blendingFake||[]);
    return L.blending.map(w=>`<span class="chip"${fake.has(w)?' style="border-style:dashed"':''}>${esc(w)}</span>`).join(' ')
      +`<div class="footnote" style="margin-top:4px">Dashed = fake word.</div>`; }
  if(pulls==='dictation') return L.dictation.length?L.dictation.map((w,i)=>`<span class="chip">${i+1}. ${esc(w)}</span>`).join(' '):'<i class="footnote">Run a skill check to pull words.</i>';
  if(pulls==='sight')     return `<div class="footnote" style="margin-bottom:4px">List ${L.listNo} of 10</div>`+L.sight.map(w=>`<span class="chip">${esc(w)}</span>`).join(' ');
  if(pulls==='skill')     return L.skill?`<b>${esc(L.skill)}</b>${L.standard?` <span class="footnote">${esc(L.standard)}</span>`:''}`:'<i class="footnote">No target yet — run a diagnostic or skill check.</i>';

  if(pulls==='letter_sounds') return '<i class="footnote">Drill graphemes already at 80%+ mastery, in random order.</i>';
  return '';
}

function saveLessonToProfile(lesson){

function litSkillKey(L){

  const pairs=[['/a/','a'],['short a','a'],['/e/','e'],['short e','e'],['/i/','i'],['short i','i'],['/o/','o'],['short o','o'],['/u/','u'],['short u','u'],

  const weeks=list.map((t,i)=>{ const ws=new Date(start.getTime()+i*7*864e5), we=new Date(ws.getTime()+6*864e5);
    return { n:i+1, start:fmtD(ws), end:fmtD(we), title:t.title, domain:t.domain, standard:t.standard, source:t.source,
      objective:lessonObjective(t,first), words:t.words||[], cycle:lessonCycle(t), home:(t.interventions||[]).slice(0,3),
      skillId:t.skillId||'' }; });
  const cal=weeks.map(w=>({when:`Wk ${w.n} · ${w.end}`, what:`${w.title} — sub-domain skill check (target: Mastered, 80%+)`}));

function printLessonPlan(enc){ const name=decodeURIComponent(enc); const html=buildLessonPlanHTML(name); if(!html){ alert('Generate the lesson plan first.'); return; } printHTMLDoc(html); }
function filterScholars(q){ q=(q||'').toLowerCase(); document.querySelectorAll('#schgrid .schcard').forEach(c=>{ c.style.display=c.dataset.name.indexOf(q)>=0?'':'none'; }); }
function startNextFor(id){ const last=loadSessions().find(s=>s.id===id); startSession(last?last.domainKey:'literacy'); const ss=S.session; if(last){ ss.student=last.student; ss.birthday=last.birthday||''; ss.grade=last.grade; ss.iep=!!last.iep; ss.plan504=!!last.plan504; ss.accommodations=(last.accommodations||[]).slice(); if(last.birthday) ss.autoPlaced=true; } renderSetup(); }

/* ===================================================================
   5. SETUP — single hub: grade, content, phase, evaluator, plan flags
   =================================================================== */
function startSession(domainKey){
  S.session={ id:uid(), grade:"K", domainKey, module:"full", student:"", birthday:"", date:new Date().toISOString().slice(0,10),
    location:"", evaluator:getEvaluators()[0]||"", phase:monthToPhase(new Date().getMonth()),
    iep:false, plan504:false, accommodations:[], notes:"", recommendations:"",
    letterScale:"mixed",   // which letter-naming scale this session used
    startTime:null, durationMin:null, idx:0, marks:{}, fluency:{}, timers:{}, iprompts:{}, responses:{}, focus:{},
    discontinued:false, regressedFrom:null, autoPlaced:false };
  nav("setup");
}
function hasAccom(name){ return (S.session.accommodations||[]).includes(name); }
function renderSetup(){
  const ss=S.session, built=hasAssessment(ss.grade,ss.domainKey), evals=getEvaluators();
  const age=ageFrom(ss.birthday);
  app.innerHTML=`<div class="screen card">
    <div class="eyebrow">New Diagnostic Session</div>
    <h2>Set up the assessment</h2>
    <p class="lead">Enter the scholar's birthday and the tool will place them at the right grade and 4D quarter automatically. You can override any field. No data leaves this device.</p>
    <div class="row" style="margin-top:18px">
      <div class="col"><label>Scholar name / initials</label><input id="f_student" placeholder="e.g., A.R." value="${esc(ss.student)}" oninput="setField('student',this.value)"></div>
      <div class="col"><label>Scholar birthday</label><input id="f_bday" type="date" value="${esc(ss.birthday)}" onchange="autoPlace(this.value)"></div>
    </div>
    ${ss.autoPlaced&&age!=null?`<div class="note" style="background:#eef6ec;border-color:#cfe6c5;color:#3f7a35">Auto-placed from birthday: <b>${gradeLabel(ss.grade)}</b>, <b>${PHASES[ss.phase].label}</b> (age ${age}, ${PHASES[ss.phase].months}). Adjust below if needed.</div>`:''}
    <div class="row">
      <div class="col"><label>Grade ${age!=null?'(auto)':''}</label><select id="f_grade" onchange="setField('grade',this.value)">
        ${GRADES.map(g=>`<option value="${g.k}" ${ss.grade===g.k?'selected':''}>${g.label}</option>`).join("")}</select></div>
      <div class="col"><label>Content area</label><select id="f_domain" onchange="setField('domainKey',this.value)">
        <option value="literacy" ${ss.domainKey==='literacy'?'selected':''}>Literacy Foundations</option>
        <option value="math" ${ss.domainKey==='math'?'selected':''}>Math Foundations</option></select></div>
    </div>
    ${built && modulesFor(ss.grade,ss.domainKey).length>1?`<div class="row"><div class="col"><label>Assessment focus</label>
      <select id="f_module" onchange="setField('module',this.value)">${modulesFor(ss.grade,ss.domainKey).map(m=>`<option value="${m.key}" ${(ss.module||'full')===m.key?'selected':''}>${esc(m.label)}</option>`).join("")}</select>
      <p class="footnote" style="margin-top:4px">Run the full diagnostic, or a targeted check — such as Oral Reading Fluency, Reading Comprehension, or a focused skill module for this grade.</p></div><div class="col"></div></div>`:''}
    ${built?'':`<div class="note">The ${gradeLabel(ss.grade)} · ${domLabel(ss.domainKey)} battery is being finalized. Every other grade is ready today — switch Grade to run a live diagnostic now.</div>`}
    <div class="row">
      <div class="col"><label>Date</label><input id="f_date" type="date" value="${esc(ss.date)}" oninput="setField('date',this.value)"></div>
      <div class="col"><label>Location</label><input id="f_location" placeholder="Home visit · Library · Online" value="${esc(ss.location)}" oninput="setField('location',this.value)"></div>
    </div>
    <div class="row">
      <div class="col"><label>Evaluator</label>
        <div style="display:flex;gap:8px">
          <select id="f_eval" style="flex:1" onchange="setField('evaluator',this.value)">${evals.map(e=>`<option ${ss.evaluator===e?'selected':''}>${esc(e)}</option>`).join("")}</select>
          <button class="btn ghost sm" onclick="newEvaluator()">+ Add</button>
        </div></div>
      <div class="col"><label>Learning plan</label>
        <div class="row" style="gap:8px">
          <label class="check" style="flex:1"><input type="checkbox" ${ss.iep?'checked':''} onchange="setField('iep',this.checked)"> IEP</label>
          <label class="check" style="flex:1"><input type="checkbox" ${ss.plan504?'checked':''} onchange="setField('plan504',this.checked)"> 504</label>
        </div></div>
    </div>
    ${(ss.iep||ss.plan504)?`<div style="margin-top:6px"><label>Accommodations (enable for this scholar)</label>
      <div class="promptgrid">${ACCOMMODATIONS.map(a=>`<label class="${hasAccom(a)?'on':''}"><input type="checkbox" ${hasAccom(a)?'checked':''} onchange="toggleAccom('${a}',this)"> ${esc(a)}</label>`).join("")}</div>
      <p class="footnote">“Allow manipulatives” shows counters on the scholar screen. “Multiple prompts” lifts the 2-prompt limit. All accommodations are recorded on the report.</p></div>`:''}
    <label style="margin-top:18px">4D Learning Cycle — quarter ${age!=null?'(auto from calendar)':''}</label>
    <div class="phase-tabs" id="phaseTabs">
      ${PHASE_ORDER.map(k=>{const p=PHASES[k];return `<div class="ptab p-${k} ${ss.phase===k?'on':''}" data-phase="${k}">
        <div class="q">${p.quarter} · ${esc(p.months)}</div><div class="nm">${p.label}</div><div class="ds">${esc(p.sub)}</div></div>`;}).join("")}
    </div>
    <div class="subtest-foot">
      <button class="btn ghost" onclick="nav('home')">Cancel</button>
      ${built?`<button class="btn ghost" onclick="downloadScholarDeck()">Download Scholar Slides</button>`:''}
      <button class="btn" onclick="beginAssess()" ${built?'':'disabled'}>Start Assessment</button>
    </div>
    ${built?`<p class="footnote">The <b>Scholar Slides</b> are a separate deck to open on the scholar's own screen (advance with the arrow keys). This keeps the Cornerstone tool focused on scoring only.</p>`:''}
  </div>`;
  document.querySelectorAll('#phaseTabs .ptab').forEach(t=>t.addEventListener('click',()=>{
    S.session.phase=t.dataset.phase;
    document.querySelectorAll('#phaseTabs .ptab').forEach(x=>x.classList.toggle('on',x===t));
  }));
}
function autoPlace(bday){ const ss=S.session; ss.birthday=bday; const g=ageToGrade(bday); if(g){ ss.grade=g; ss.phase=monthToPhase(new Date().getMonth()); ss.autoPlaced=true; } renderSetup(); }
function toggleAccom(name,el){ const arr=S.session.accommodations||(S.session.accommodations=[]); const i=arr.indexOf(name); if(el.checked&&i<0)arr.push(name); else if(!el.checked&&i>=0)arr.splice(i,1); el.parentNode.classList.toggle('on',el.checked); }
function setField(k,v){ S.session[k]=v; if(k==='grade'||k==='domainKey'){ S.session.module='full'; } if(k==='grade'||k==='domainKey'||k==='iep'||k==='plan504') renderSetup(); }
function newEvaluator(){ const n=prompt("Add a new evaluator's name:"); if(n&&n.trim()){ addEvaluator(n); S.session.evaluator=n.trim(); renderSetup(); } }
function beginAssess(){
  const ss=S.session;
  if(!hasAssessment(ss.grade,ss.domainKey)) return;
  ss.student=(ss.student||"").trim()||"Scholar";
  ss.location=(ss.location||"").trim()||"—";
  ss.evaluator=(ss.evaluator||"").trim()||"—";
  ss.idx=0; ss.discontinued=false;
  // Every evaluation opens with the rapport-building Scholar Profile intake
  const existing=getProfile(ss.student)||{};
  S.intake={ mode:'eval', name:ss.student, data:Object.assign({}, existing, { birthday: ss.birthday||existing.birthday||'', age: (ageFrom(ss.birthday)!=null?ageFrom(ss.birthday):(existing.age||'')) }) };
  nav("intake");
}
/* ===================================================================
   5b. SCHOLAR PROFILE — "Get to Know You" intake (rapport + interests)
   =================================================================== */
function createScholarProfile(){ S.intake={ mode:'standalone', name:'', data:{} }; nav("intake"); }
function renderIntake(){
  const it=S.intake||{mode:'eval',name:'',data:{}}, mode=it.mode, name=(mode==='eval'? (S.session&&S.session.student) : it.name)||'', data=it.data||(it.data={});
  app.innerHTML=`<div class="screen card">
    <div class="eyebrow">${mode==='eval'?'Step 1 · Build Rapport':'Create a Scholar Profile'}</div>
    <h2>Get to know ${esc(name)||'your scholar'}</h2>
    <p class="lead">Before any assessment, we spend a few warm minutes getting to know the scholar. This builds trust and rapport, and gives us their interests, favorite color, and the people and dreams that matter to them — so we can teach with culturally relevant, personally meaningful examples.</p>
    ${mode==='standalone'?`<div class="row" style="margin-top:14px"><div class="col"><label>Scholar name / initials</label><input id="ik_name" value="${esc(name)}" oninput="S.intake.name=this.value"></div><div class="col"></div></div>`:''}
    <div class="intakegrid">
      ${INTAKE.map(q=>`<div class="intakeq ${q.type==='textarea'?'wide':''}">
        <label>${esc(q.q)}</label>
        <div class="intakerow">
        ${q.type==='textarea'
          ? `<textarea id="ik_${q.k}" placeholder="${q.ph}" oninput="S.intake.data['${q.k}']=this.value">${esc(data[q.k]||'')}</textarea>`
          : `<input id="ik_${q.k}" type="${q.type==='number'?'number':q.type==='date'?'date':'text'}" placeholder="${q.ph}" value="${esc(data[q.k]||'')}" oninput="S.intake.data['${q.k}']=this.value${q.k==='color'?";document.getElementById('ik_sw').style.background=(colorHex(this.value)||'transparent')":''}">`}
        ${q.k==='color'?`<span class="colorswatch" id="ik_sw" style="background:${colorHex(data.color)||'transparent'}"></span>`:''}
        </div>
      </div>`).join("")}
    </div>
    <p class="footnote">Answers save with the scholar and carry forward to every future quarter. Skip any question the scholar would rather not answer.</p>
    <div class="subtest-foot">
      <button class="btn ghost" onclick="nav('${mode==='eval'?'setup':'scholars'}')">Back</button>
      ${mode==='eval'?`<button class="btn ghost" onclick="intakeSkip()">Skip for now</button>`:''}
      <button class="btn" onclick="intakeSave()">${mode==='eval'?'Save &amp; Start Assessment':'Save Scholar Profile'}</button>
    </div>
  </div>`;
}
function intakeSave(){
  const it=S.intake, mode=it.mode, name=(mode==='eval'? S.session.student : (it.name||'').trim());
  if(mode==='standalone' && !name){ alert("Please enter the scholar's name first."); return; }
  saveProfile(name, it.data||{});
  if(mode==='eval'){ S.session.profile=Object.assign({}, it.data); if(it.data.birthday) S.session.birthday=it.data.birthday; S.session.startTime=Date.now(); nav("assess"); }
  else { S.intake=null; nav("scholars"); }
}
function intakeSkip(){ S.session.profile=Object.assign({}, getProfile(S.session.student)||{}); S.session.startTime=Date.now(); nav("assess"); }

}

  <div class="frame"><div class="count" id="count"></div><div class="kh" id="kh">Your turn!</div><div class="ks" id="ks"></div>

  <script>
  var PC=['#FF8FB0','#FFB07A','#EDC65A','#86CF7C','#6FCFE0'];
  function bub(t){ t=String(t||''); return t.split('').map(function(ch,i){ return ch===' '?' ':'<span style="color:'+PC[i%5]+'">'+ch+'</span>'; }).join(''); }
  function manipRow(){ var s=''; for(var k=0;k<10;k++) s+='<span class="counter c'+(k%5)+'"></span>'; return '<div class="manips"><div class="manips-h">Counters</div><div class="manips-row">'+s+'</div></div>'; }
  function applyPtr(p){ p=p||{on:false,idx:0}; var nodes=document.querySelectorAll('#stim .mdot, #stim .tile, #stim .objitem, #stim .counter');
    nodes.forEach(function(n,i){ n.classList.toggle('ptrnow', p.on&&i===p.idx-1); n.classList.toggle('ptrdim', p.on&&p.idx>0&&i!==p.idx-1); }); }
  function render(d){ if(!d) return; var pOn=d.pointer&&d.pointer.on&&d.pointer.idx>0;
    document.getElementById('kh').innerHTML=pOn?'':bub(d.heading);
    document.getElementById('ks').textContent=d.sub||'';
    document.getElementById('count').textContent=pOn?d.pointer.idx:'';
    document.getElementById('stim').innerHTML=d.stim||'';
    document.getElementById('manips').innerHTML=d.manip?manipRow():'';
    applyPtr(d.pointer);
  }
  window.addEventListener('message',function(e){ if(e&&e.data&&e.data.heading!==undefined) render(e.data); });
  window.addEventListener('storage',function(e){ if(e.key==='${LIVE}'&&e.newValue){ render(JSON.parse(e.newValue)); }});
  try{ var init=localStorage.getItem('${LIVE}'); if(init) render(JSON.parse(init)); }catch(e){}
  <\/script></body></html>`;

function broadcastStimulus(done){
  const ss=S.session; let payload;
  if(done){ payload={heading:"Great job!",sub:"You worked so hard today.",stim:'<div class="big">★</div>',manip:false}; }
  else { const st=subtestsFor(ss)[ss.idx];
    payload={heading:kidHeading(st),sub:kidSub(st),stim:buildStudentHTML(st,true),manip:hasAccom('Allow manipulatives')}; }
  payload.pointer={on:PTR.on, idx:PTR.idx};
  payload.t=Date.now();
  save(LIVE,payload);
  if(scholarWin && !scholarWin.closed){ try{ scholarWin.postMessage(payload,'*'); }catch(e){} }
}

function deckSlides(grade,domain){

  var SLIDES=${data}, i=0;
  function fit(){

        el.style.fontSize=(cur*0.93)+'px';

      }

function downloadScholarDeck(){
  const ss=S.session, grade=(ss&&ss.grade)||"K", domain=(ss&&ss.domainKey)||"literacy";
  const html=buildScholarDeck(grade,domain);
  if(!html){ alert("No scholar slides for this grade/content yet."); return; }
  download(`Cornerstone-Scholar-Slides_${gradeLabel(grade).replace(/\W+/g,'')}_${domain}.html`, html, "text/html");
}
function modulesFor(grade,domain){ const A=ASSESSMENTS[grade+"|"+domain]; return (A&&A.modules)||[{key:'full',label:'Full Diagnostic',ids:null}]; }
function subtestsFor(ss){ const A=ASSESSMENTS[ss.grade+"|"+ss.domainKey]; if(!A) return []; const mod=modulesFor(ss.grade,ss.domainKey).find(m=>m.key===(ss.module||'full')); if(!mod||!mod.ids) return A.subtests; return A.subtests.filter(s=>mod.ids.includes(s.id)); }
function currentSubtests(){ return subtestsFor(S.session); }

function renderAssess(){
  const ss=S.session, A=ASSESSMENTS[ss.grade+"|"+ss.domainKey], subs=subtestsFor(ss), n=subs.length;

/* Math measures that show a VISUAL (objects / ten-frames) instead of a symbolic

const MATH_VIS={ math_add:'add', math_sub:'sub', math_make10:'make10', math_teen:'teen', math_compare:'compare' };
/* Show the whole set at once ONLY when the standard assesses fluency / directionality
   (timed measures) or connected text (a sentence). Otherwise: ONE item at a time. */
function showAllStimulus(st){ return !!st.timed || (st.stimulus && (st.stimulus.type==='sentence'||st.stimulus.type==='passage')); }
function hasVisual(st){ return !!(MATH_VIS[st.id] || st.id==='math_measure' || st.stimulus); }
function hasStepStimulus(st){ return !showAllStimulus(st) && (MATH_VIS[st.id] || st.id==='math_measure' || (st.stimulus && ['tiles','dots','shapes'].includes(st.stimulus.type))); }

/* optional 1:1 pointer — evaluator taps to advance a highlight + count (APL CAPS) */
function togglePointer(){ PTR.on=!PTR.on; if(!PTR.on)PTR.idx=0; renderAssess(); }
function ptrTap(){ PTR.idx=(PTR.idx||0)+1; renderAssess(); }
function ptrReset(){ PTR.idx=0; renderAssess(); }
function applyPreviewPointer(){ const nodes=document.querySelectorAll('.studentpane .mdot, .studentpane .tile, .studentpane .objitem, .studentpane .counter');
  nodes.forEach((n,i)=>{ n.classList.toggle('ptrnow', PTR.on&&i===PTR.idx-1); n.classList.toggle('ptrdim', PTR.on&&PTR.idx>0&&i!==PTR.idx-1); }); }
function stepFocus(id,d){ const st=currentSubtests().find(s=>s.id===id); const n=stepCount(st); const f=curFocus(st);
  S.session.focus[id]=Math.max(0,Math.min(n-1,f+d)); renderAssess(); }

function dotsCluster(n){ return `<div class="mgrp">${Array.from({length:n},()=>'<span class="mdot"></span>').join("")}</div>`; }
function dotsClusterRemoved(n,removed){ return `<div class="mgrp">${Array.from({length:n},(_,k)=>`<span class="mdot ${k>=n-removed?'gone':''}"></span>`).join("")}</div>`; }
function tenFrame(filled){ return `<div class="tenframe">${Array.from({length:10},(_,k)=>`<span class="tfc ${k<filled?'on':''}"></span>`).join("")}</div>`; }
function mathVisual(st){
  const phase=S.session.phase, showEq=(phase==='deepen'||phase==='demonstrate');
  const item=st.items[curFocus(st)]; const label=item?item.label:""; const nums=(label.match(/\d+/g)||[]).map(Number);
  const type=MATH_VIS[st.id]; let inner="";
  if(type==='add'){ const a=nums[0]||0,b=nums[1]||0; inner=dotsCluster(a)+(showEq?'<span class="mop">+</span>':'<span class="msep">and</span>')+dotsCluster(b); }
  else if(type==='sub'){ const a=nums[0]||0,b=nums[1]||0; inner=dotsClusterRemoved(a,b); }
  else if(type==='make10'){ inner=tenFrame(0)+'<div class="mhint">Ten-frame</div>'; }
  else if(type==='teen'){ const ones=(nums[0]||0)-(nums[1]||10); inner=tenFrame(10)+(ones>0?'<span class="msep">and</span>'+dotsCluster(ones):''); }
  else if(type==='compare'){ const a=nums[0]||0,b=nums[1]||0; inner=dotsCluster(a)+'<span class="mop vs">'+(showEq?'?':'')+'</span>'+dotsCluster(b); }
  return `${showEq?`<div class="meq">${esc(label)}</div>`:''}<div class="mvis">${inner}</div>`;
}
/* recognizable-object visuals (measurement & sorting), labeled A / B */
function objPencil(len,color){ const w=len,h=30; return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect x="14" y="7" width="${w-30}" height="16" rx="2" fill="${color}" stroke="#2a2620" stroke-width="2"/><polygon points="${w-16},5 ${w-3},15 ${w-16},25" fill="#F2C879" stroke="#2a2620" stroke-width="2"/><rect x="4" y="7" width="10" height="16" rx="2" fill="#FF9AB0" stroke="#2a2620" stroke-width="2"/></svg>`; }
function objCup(s,color){ const w=46+s,h=52+s; return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polygon points="7,7 ${w-7},7 ${w-14},${h-5} 14,${h-5}" fill="${color}" stroke="#2a2620" stroke-width="2.5"/></svg>`; }
function objBall(d,color){ return `<svg width="${d}" height="${d}" viewBox="0 0 ${d} ${d}"><circle cx="${d/2}" cy="${d/2}" r="${d/2-3}" fill="${color}" stroke="#2a2620" stroke-width="2.5"/><path d="M${d*0.2} ${d*0.4} Q${d/2} ${d*0.15} ${d*0.8} ${d*0.4}" fill="none" stroke="#2a2620" stroke-width="2"/></svg>`; }
function objCrayon(hgt,color){ const w=28,h=hgt; return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect x="6" y="16" width="16" height="${h-18}" rx="3" fill="${color}" stroke="#2a2620" stroke-width="2"/><polygon points="6,16 22,16 14,3" fill="${color}" stroke="#2a2620" stroke-width="2"/></svg>`; }
function measureScene(i){
  const P='#7FB2E6',R='#FF8FB0',G='#86CF7C',Y='#EDC65A',O='#FFB07A';
  const pair=(a,b)=>`<div class="objscene"><div class="objitem">${a}<div class="albl">A</div></div><div class="objitem">${b}<div class="albl">B</div></div></div>`;
  if(i===0) return pair(objPencil(120,Y),objPencil(220,Y));                         // which is longer
  if(i===1) return pair(objCup(4,P),objCup(40,P));                                  // which holds more
  if(i===2) return pair(objBall(120,R),objBall(66,R));                              // which is heavier

  if(i===4) return `<div class="objscene"><div class="objitem">${objCrayon(80,O)}</div><div class="objitem">${objCrayon(120,O)}</div><div class="objitem">${objCrayon(160,O)}</div></div>`; // shortest → tallest

/* large, solid-filled geometry (no box) */
function shapeSVG(name){

  const f=fills[name]||'#FF8FB0', S='#2a2620';

    case 'square': return `<svg viewBox="0 0 120 120"><rect x="12" y="12" width="96" height="96" rx="6" fill="${f}" stroke="${S}" stroke-width="4"/></svg>`;
    case 'triangle': return `<svg viewBox="0 0 120 120"><polygon points="60,14 106,104 14,104" fill="${f}" stroke="${S}" stroke-width="4" stroke-linejoin="round"/></svg>`;
    case 'rectangle': return `<svg viewBox="0 0 150 104"><rect x="10" y="24" width="130" height="56" rx="6" fill="${f}" stroke="${S}" stroke-width="4"/></svg>`;
    case 'cube': return `<svg viewBox="0 0 130 130"><polygon points="28,44 82,44 82,98 28,98" fill="${f}" stroke="${S}" stroke-width="4" stroke-linejoin="round"/><polygon points="28,44 52,22 106,22 82,44" fill="${f}" stroke="${S}" stroke-width="4" stroke-linejoin="round" opacity="0.88"/><polygon points="82,44 106,22 106,76 82,98" fill="${f}" stroke="${S}" stroke-width="4" stroke-linejoin="round" opacity="0.72"/></svg>`;
    case 'sphere': return `<svg viewBox="0 0 120 120"><defs><radialGradient id="sg" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#ffffff"/><stop offset="55%" stop-color="${f}"/><stop offset="100%" stop-color="${f}"/></radialGradient></defs><circle cx="60" cy="60" r="52" fill="url(#sg)" stroke="${S}" stroke-width="4"/></svg>`;
    default: return '';

}

function stepperHTML(st){ return `<div class="stepper"><button onclick="stepFocus('${st.id}',-1)" ${curFocus(st)===0?'disabled':''}>&lsaquo;</button><span>Showing ${curFocus(st)+1} of ${stepCount(st)}</span><button onclick="stepFocus('${st.id}',1)" ${curFocus(st)>=stepCount(st)-1?'disabled':''}>&rsaquo;</button></div>`; }

function countScored(){ const ss=S.session, subs=currentSubtests(); let n=0;
  for(let s=0;s<=ss.idx;s++){ const st=subs[s]; if(st.type!=='items')continue; (ss.marks[st.id]||[]).forEach(x=>{ if(x!==null)n++; }); } return n; }
function wrongInSkill(stid){ return (S.session.marks[stid]||[]).filter(x=>x===false).length; }
function checkDiscontinue(){
  const ss=S.session, st=currentSubtests()[ss.idx];
  if(!st || st.type!=='items') return;
  ss.skillFlag=ss.skillFlag||{};
  if(wrongInSkill(st.id)>=DISCONTINUE_STREAK && !ss.skillFlag[st.id]){
    ss.skillFlag[st.id]=true;
    setTimeout(()=>{
      const cont=confirm(`${ss.student} has ${DISCONTINUE_STREAK} wrong in “${st.title}.”\n\nOK = Continue on\nCancel = Stop here`);
      if(cont){ const why=prompt("Optional — note why you're continuing (saved to the report):");
        if(why && why.trim()){ ss.notes=(ss.notes?ss.notes+"\n":"")+`[Continued past stop rule on "${st.title}"] ${why.trim()}`; } }
      else { stopAssessment(); }
    },40);
  }
}
function stopAssessment(){
  const ss=S.session, lower=gradeDown(ss.grade), early=countScored()<=DISCONTINUE_STREAK+1;
  if(early && lower && hasAssessment(lower,ss.domainKey)){
    if(confirm(`Step DOWN to ${gradeLabel(lower)} for a more appropriate level?\n\nOK = step down\nCancel = end & flag struggle`)){
      ss.regressionPath=(ss.regressionPath||[]); ss.regressionPath.push({from:ss.grade,to:lower});
      ss.grade=lower; ss.idx=0; ss.marks={}; ss.iprompts={}; ss.fluency={}; ss.timers={}; ss.focus={}; ss.skillFlag={}; ss.discontinued=false;
      mtClear(); renderAssess(); return;
    }
  }
  ss.discontinued=true;
  if(early && lower && !hasAssessment(lower,ss.domainKey)) ss.regressionNote=`Showed early struggle at ${gradeLabel(ss.grade)} level; recommend reassessing at ${gradeLabel(lower)}, or run a targeted skill check at that level.`;
  finishAssess();
}
function nextSub(){ const n=currentSubtests().length; if(S.session.idx<n-1){ S.session.idx++; mtClear(); renderAssess(); } else finishAssess(); }
function prevSub(){ if(S.session.idx>0){ S.session.idx--; mtClear(); renderAssess(); } }
function fmtTime(s){ s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function startTimer(){
  if(S.timer) clearInterval(S.timer);
  const t=document.getElementById('timer'); if(!t||!S.session.startTime) return;
  const upd=()=>{ const s=Math.floor((Date.now()-S.session.startTime)/1000); t.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); };

/* measure stopwatch */
function mtStart(id){ if(MT.running&&MT.id===id) return; mtClear(); MT={id,elapsed:S.session.timers[id]||0,running:true,int:null};
  const base=Date.now()-MT.elapsed*1000; MT.int=setInterval(()=>{ MT.elapsed=(Date.now()-base)/1000; S.session.timers[id]=Math.round(MT.elapsed); const d=document.getElementById('mt_disp'); if(d)d.textContent=fmtTime(MT.elapsed); },200); }
function mtStop(id){ if(MT.int)clearInterval(MT.int); MT.running=false; S.session.timers[id]=Math.round(MT.elapsed||0); const d=document.getElementById('mt_disp'); if(d)d.textContent=fmtTime(MT.elapsed); }
function mtReset(id){ mtStop(id); MT.elapsed=0; S.session.timers[id]=0; const d=document.getElementById('mt_disp'); if(d)d.textContent='0:00'; }
function mtClear(){ if(MT.int)clearInterval(MT.int); MT={id:null,elapsed:0,int:null,running:false}; }
function finishAssess(){
  const ss=S.session;
  ss.durationMin=Math.max(1,Math.round((Date.now()-(ss.startTime||Date.now()))/60000));
  if(S.timer){ clearInterval(S.timer); S.timer=null; } mtClear();
