/* ===================================================================
   8. SCORING ENGINE
   =================================================================== */
function scoreSubtest(st, ss){
  const phase=ss.phase;
  if(st.type==='fluency'){
    const v=ss.fluency[st.id]||0; const b=st.benchmarks[PHASES[phase].bm];
    const pct=Math.max(0,Math.min(100,Math.round(v/b.core*100)));
    const status=v>=b.core?'strong':v>=b.strat?'dev':'focus';
    const band=v>=b.core*1.25?'soaring':v>=b.core?'ontrack':v>=b.strat?'developing':'emerging';
    const season=PHASES[phase].bm; const nrm=(READING_NORMS[String(ss.grade)]||{})[season];
    const avg=(st.unit&&st.unit.indexOf('WCPM')>=0&&nrm)?nrm[1]:null;
    return { id:st.id,title:st.title,strand:st.strand,standard:st.standard,goal:st.goal,type:'fluency',
      raw:v, time:(ss.timers&&ss.timers[st.id])||0, display:v+" "+(st.unit||''), pct,status,band,avg, interventions:st.interventions };
  }
  const m=ss.marks[st.id]||[]; const yes=m.filter(x=>x===true).length, sk=m.filter(x=>x==='skip').length, max=st.items.length;
  const pct=Math.round(yes/max*100); const th=PHASES[phase].th;
  const status=pct>=th.strong?'strong':pct>=th.dev?'dev':'focus';
  const band=pct>=95?'soaring':pct>=th.strong?'ontrack':pct>=th.dev?'developing':'emerging';
  return { id:st.id,title:st.title,strand:st.strand,standard:st.standard,goal:st.goal,type:'items',
    raw:yes, skipped:sk, display:yes+"/"+max+(sk?` (${sk} skipped)`:''), pct,status,band,interventions:st.interventions };
}
function scoreSession(ss){
  const A=ASSESSMENTS[ss.grade+"|"+ss.domainKey];
  const moduleSubs=subtestsFor(ss);
  const subs=moduleSubs.map(st=>scoreSubtest(st,ss));
  const strands={}; subs.forEach(s=>{ (strands[s.strand]=strands[s.strand]||[]).push(s); });
  const strandRows=Object.keys(strands).map(name=>{ const arr=strands[name]; const pct=Math.round(arr.reduce((a,b)=>a+b.pct,0)/arr.length);
    const th=PHASES[ss.phase].th; const status=pct>=th.strong?'strong':pct>=th.dev?'dev':'focus'; return { name,pct,status,band:bandOverall(pct,ss.phase),count:arr.length }; });
  const overall=Math.round(subs.reduce((a,b)=>a+b.pct,0)/subs.length);
  const overallBand=bandOverall(overall,ss.phase);
  const focus=subs.filter(s=>s.status==='focus'), dev=subs.filter(s=>s.status==='dev'), strong=subs.filter(s=>s.status==='strong');
  let tier='core'; if(ss.discontinued||focus.length>=Math.ceil(subs.length*0.34)) tier='intensive';
  else if(focus.length>=1||dev.length>=Math.ceil(subs.length*0.4)) tier='strategic';
  // per-item prompt analytics (max-2 rule; action = required note)
  const promptTypes={}, strandPrompts={}; let promptedItems=0, scoredItems=0;
  moduleSubs.forEach(st=>{ if(st.type!=='items')return; const ip=(ss.iprompts||{})[st.id]||{}; const m=ss.marks[st.id]||[];
    st.items.forEach((it,i)=>{ if(m[i]!=null) scoredItems++; const arr=ip[i]||[]; if(arr.length){ promptedItems++; strandPrompts[st.strand]=(strandPrompts[st.strand]||0)+1; arr.forEach(pr=>{ promptTypes[PROMPTS[pr.p]]=(promptTypes[PROMPTS[pr.p]]||0)+1; }); } }); });
  const promptsUsed=Object.keys(promptTypes);
  const promptDependency=scoredItems?promptedItems/scoredItems:0;
  const topPrompts=Object.entries(promptTypes).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>e[0]);
  const promptSkillStrands=Object.entries(strandPrompts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>e[0]);
  // miscue / error-analysis notes — what the scholar actually said, per item
  const responseNotes=[];
  moduleSubs.forEach(st=>{ if(st.type!=='items')return; const rr=(ss.responses||{})[st.id]||[]; const m=ss.marks[st.id]||[];
    st.items.forEach((it,i)=>{ if(rr[i]&&String(rr[i]).trim()) responseNotes.push({measure:st.title,item:it.label,response:String(rr[i]).trim(),correct:m[i]===true}); }); });
  return { grade:ss.grade, domainKey:ss.domainKey, phase:ss.phase, overall, overallBand, tier, subs, strandRows,
    strong, dev, focus, discontinued:!!ss.discontinued, milestones:(A.milestones&&A.milestones[PHASES[ss.phase].bm])||[],
    notes:ss.notes||"", promptsUsed, promptedItems, scoredItems, promptDependency, topPrompts, promptSkillStrands, responseNotes,
    accommodations:ss.accommodations||[], regressionPath:ss.regressionPath||[], regressionNote:ss.regressionNote||"",
    foundationGaps:ss.foundationGaps||[], recommendations:ss.recommendations||"",
    iep:!!ss.iep, plan504:!!ss.plan504, plan:buildPlan(subs,A,ss) };
}
function buildPlan(subs, A, ss){
  const order=A.subtests.map(s=>s.id);
  const need=subs.filter(s=>s.status!=='strong').sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  const phases=[[],[],[]]; need.forEach((s,i)=>{ phases[Math.min(2,Math.floor(i/Math.ceil(need.length/3||1)))].push(s); });
  const labels=[{tag:"p3",title:"3-Month Plan",sub:"Quarter ahead · most foundational"},{tag:"p6",title:"6-Month Plan",sub:"Building & connecting skills"},{tag:"p9",title:"9-Month Plan",sub:"Grade-level & independence"}];
  const th=PHASES[ss.phase].th.strong;
  return phases.map((ph,i)=>{
    if(ph.length===0) return { ...labels[i], goal:"Maintain & enrich", target:"Sustain mastered skills and extend into more complex, grade-level work.",
      strategies:["Keep mastered skills warm with brief spiral review","Introduce more challenging, grade-level extensions","Celebrate growth to build confidence and ownership"], skills:[] };
    const strats=[]; ph.forEach(s=>s.interventions.slice(0,2).forEach(x=>{ if(!strats.includes(x))strats.push(x); }));
    return { ...labels[i], goal:ph.map(s=>s.goal).slice(0,3).join(" · "),
      target:`Move ${ph.map(s=>s.title).join(", ")} from ${i===0?'a focus area to emerging mastery':i===1?'emerging to consistent':'consistent to independent, grade-level'} (target ${th}%+ on re-assessment).`,
      strategies:strats.slice(0,5), skills:ph.map(s=>({title:s.title,standard:s.standard})) };
  });
}
function serializeSession(ss,r){
  return { id:ss.id, student:ss.student, birthday:ss.birthday||"", grade:ss.grade, domainKey:ss.domainKey, module:ss.module||'full', phase:ss.phase, date:ss.date,
    location:ss.location, evaluator:ss.evaluator, durationMin:ss.durationMin, iep:!!ss.iep, plan504:!!ss.plan504,
    accommodations:ss.accommodations||[], regressionPath:ss.regressionPath||[], profile:ss.profile||getProfile(ss.student)||{},
    discontinued:!!ss.discontinued, notes:ss.notes||"", recommendations:ss.recommendations||"", overall:r.overall, tier:r.tier,
    strengths:r.strong.map(s=>s.title), focus:r.focus.map(s=>s.title), promptsUsed:r.promptsUsed, result:r, marks:ss.marks, fluency:ss.fluency, timers:ss.timers, iprompts:ss.iprompts, responses:ss.responses||{} };
}

/* Print a standalone HTML document. Tries a new window first; if that is blocked
   (the usual case in the installed iPad app), falls back to a hidden iframe so
   printing / Save-as-PDF still works from the Home-Screen app. */
function printHTMLDoc(html){
  let w=null; try{ w=window.open('','_blank'); }catch(e){}
  if(w && w.document){ w.document.write(html); w.document.close(); setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 350); return; }
  const f=document.createElement('iframe');
  f.setAttribute('aria-hidden','true');
  f.style.cssText='position:fixed;right:0;bottom:0;width:1px;height:1px;opacity:0;border:0';
  document.body.appendChild(f);
  const d=f.contentWindow.document; d.open(); d.write(html); d.close();
  const go=function(){ try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){} setTimeout(function(){ try{ f.remove(); }catch(e){} }, 1500); };
  if(d.readyState==='complete'){ setTimeout(go,300); } else { f.onload=function(){ setTimeout(go,300); }; }
}
